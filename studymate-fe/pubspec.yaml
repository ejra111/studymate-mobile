name: studymate_mobile
description: Flutter mobile client for StudyMate Laravel API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8
  google_mlkit_face_detection: ^0.13.0
  path_provider: ^2.1.4
  laravel_echo: ^1.0.0-beta.1
  socket_io_client: ^3.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
